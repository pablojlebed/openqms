<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Outer circle - quality seal ring -->
  <circle cx="24" cy="24" r="23" stroke="#2563eb" stroke-width="2" fill="none" opacity="0.3"/>

  <!-- Inner rounded square background -->
  <rect x="8" y="8" width="32" height="32" rx="8" fill="#2563eb"/>

  <!-- Letter "Q" - quality management symbol -->
  <g>
    <!-- Q circle -->
    <circle cx="19" cy="20" r="8" fill="none" stroke="white" stroke-width="2.5"/>
    <!-- Q tail -->
    <path d="M 24 28 Q 28 28 28 32" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Checkmark accent - representing verification/compliance -->
  <g>
    <circle cx="30" cy="30" r="7.5" fill="white" opacity="0.9"/>
    <polyline points="26.5,30 28.5,32 32.5,27.5"
              fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Subtle radial lines for quality/precision feel -->
  <circle cx="24" cy="24" r="20" stroke="#2563eb" stroke-width="0.8" fill="none" opacity="0.15"/>
</svg>

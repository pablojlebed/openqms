<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eff6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative circle background elements -->
  <circle cx="1100" cy="100" r="200" fill="#2563eb" opacity="0.08"/>
  <circle cx="100" cy="530" r="150" fill="#0ea5e9" opacity="0.1"/>

  <!-- Left column: Logo and Q mark -->
  <g>
    <!-- Large Q symbol -->
    <circle cx="150" cy="315" r="80" stroke="#2563eb" stroke-width="8" fill="none"/>
    <path d="M 210 370 Q 240 370 250 400" fill="none" stroke="#2563eb" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- Center: Main heading and tagline -->
  <g>
    <!-- Main title -->
    <text x="400" y="200" font-family="Outfit, sans-serif" font-size="72" font-weight="800" fill="url(#titleGradient)" letter-spacing="-2">
      OpenQMS
    </text>

    <!-- Subtitle -->
    <text x="400" y="250" font-family="Inter, sans-serif" font-size="32" font-weight="600" fill="#1e293b">
      ISO/IEC 17025
    </text>

    <!-- Tagline -->
    <text x="400" y="310" font-family="Inter, sans-serif" font-size="20" font-weight="400" fill="#475569">
      An open Quality Management System
    </text>
    <text x="400" y="340" font-family="Inter, sans-serif" font-size="20" font-weight="400" fill="#475569">
      for testing and calibration laboratories
    </text>
  </g>

  <!-- Right column: Feature badges -->
  <g>
    <!-- Badge 1: Aligned -->
    <rect x="900" y="120" width="260" height="100" rx="8" fill="white" opacity="0.8"/>
    <circle cx="930" cy="155" r="20" fill="#2563eb"/>
    <text x="965" y="160" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Aligned to</text>
    <text x="965" y="180" font-family="Inter, sans-serif" font-size="13" font-weight="400" fill="#64748b">ISO/IEC 17025:2017</text>
    <text x="965" y="200" font-family="Inter, sans-serif" font-size="13" font-weight="400" fill="#64748b">international standard</text>

    <!-- Badge 2: Open -->
    <rect x="900" y="240" width="260" height="100" rx="8" fill="white" opacity="0.8"/>
    <circle cx="930" cy="275" r="20" fill="#0ea5e9"/>
    <text x="965" y="280" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Open &amp;</text>
    <text x="965" y="298" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Community-Driven</text>
    <text x="965" y="320" font-family="Inter, sans-serif" font-size="13" font-weight="400" fill="#64748b">CC BY-NC 4.0 licensed</text>

    <!-- Badge 3: Ready -->
    <rect x="900" y="360" width="260" height="100" rx="8" fill="white" opacity="0.8"/>
    <circle cx="930" cy="395" r="20" fill="#06b6d4"/>
    <text x="965" y="400" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Ready to Use</text>
    <text x="965" y="420" font-family="Inter, sans-serif" font-size="13" font-weight="400" fill="#64748b">Templates, checklists,</text>
    <text x="965" y="438" font-family="Inter, sans-serif" font-size="13" font-weight="400" fill="#64748b">and procedures</text>
  </g>

  <!-- Bottom: Website URL -->
  <text x="400" y="580" font-family="Inter, sans-serif" font-size="18" font-weight="500" fill="#2563eb">
    openqms.thelabguy.org
  </text>
</svg>
